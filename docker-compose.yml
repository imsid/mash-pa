services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mash_pa
      POSTGRES_USER: mash
      POSTGRES_PASSWORD: mash
    ports:
      # Published for the local dev loop (`docker compose up -d db` +
      # `pa serve` on the host machine); the pa service uses the
      # internal network either way.
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mash -d mash_pa"]
      interval: 2s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  pa:
    image: ghcr.io/imsid/mash-pa:latest
    build: .
    env_file: .env
    environment:
      MASH_DATABASE_URL: postgresql://mash:mash@db:5432/mash_pa
    ports:
      - "8000:8000"
    volumes:
      - padata:/var/lib/pa
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  padata:
